<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f7f4ed">
    <title>五线谱识音练习</title>
    <link rel="stylesheet" href="styles.css">
    <script src="app.js" defer></script>
  </head>
  <body>
    <main class="app-shell" aria-labelledby="app-title">
      <header class="topbar">
        <div>
          <h1 id="app-title">五线谱识音练习</h1>
          <p id="mode-subtitle">从位置到音名、唱名和听觉，一题一题练熟。</p>
        </div>
        <button class="icon-button" id="reset-progress" type="button" aria-label="重置练习进度" title="重置练习进度">
          <svg aria-hidden="true" viewBox="0 0 24 24">
            <path d="M4.7 9.2a7.7 7.7 0 1 1 1.6 7.9"/>
            <path d="M4.2 4.8v4.9h4.9"/>
          </svg>
        </button>
      </header>

      <nav class="mode-tabs" aria-label="练习模式">
        <button type="button" class="tab" data-mode="challenge">闯关</button>
        <button type="button" class="tab is-active" data-mode="random">随机</button>
        <button type="button" class="tab" data-mode="pattern">规律</button>
        <button type="button" class="tab" data-mode="ledger">加线</button>
        <button type="button" class="tab" data-mode="audio">听音</button>
        <button type="button" class="tab" data-mode="review">复习</button>
      </nav>

      <section class="stats-strip" aria-label="练习统计">
        <div>
          <span class="stat-value" id="stat-accuracy">0%</span>
          <span class="stat-label">正确率</span>
        </div>
        <div>
          <span class="stat-value" id="stat-streak">0</span>
          <span class="stat-label">连续</span>
        </div>
        <div>
          <span class="stat-value" id="stat-today">0</span>
          <span class="stat-label">今日</span>
        </div>
        <div>
          <span class="stat-value" id="stat-weak">0</span>
          <span class="stat-label">待复习</span>
        </div>
      </section>

      <section class="practice-stage" aria-live="polite">
        <!-- DEBUG: 测试用关卡选择器，上线前删除 ↓ -->
        <div class="challenge-bar" id="challenge-bar" hidden>
          <span class="challenge-badge">第 <strong id="challenge-level-num">1</strong> 关</span>
          <span class="challenge-title" id="challenge-level-title"></span>
          <select class="debug-level-select" id="debug-level-select" title="测试用：直接跳转关卡">
            <option value="1">第1关</option><option value="2">第2关</option><option value="3">第3关</option>
            <option value="4">第4关</option><option value="5">第5关</option><option value="6">第6关</option>
            <option value="7">第7关</option><option value="8">第8关</option><option value="9">第9关</option>
            <option value="10">第10关</option><option value="11">第11关</option><option value="12">第12关</option>
            <option value="13">第13关</option><option value="14">第14关</option><option value="15">第15关</option>
            <option value="16">第16关</option><option value="17">第17关</option><option value="18">第18关</option>
            <option value="19">第19关</option><option value="20">第20关</option><option value="21">第21关</option>
            <option value="22">第22关</option><option value="23">第23关</option><option value="24">第24关</option>
            <option value="25">第25关</option><option value="26">第26关</option><option value="27">第27关</option>
          </select>
          <span class="challenge-attempts" id="challenge-attempts"></span>
        </div>
        <!-- DEBUG: 测试用关卡选择器，上线前删除 ↑ -->
        <div class="challenge-progress" id="challenge-progress" hidden></div>

        <div class="stage-head">
          <div>
            <p class="eyebrow" id="question-type">随机抽查</p>
            <h2 id="question-title">看谱面，点选音名和唱名</h2>
          </div>
          <button class="tool-button" id="play-note" type="button">
            <svg aria-hidden="true" viewBox="0 0 24 24">
              <path d="M8 5v14l11-7z"/>
            </svg>
            <span>播放</span>
          </button>
        </div>

        <div class="canvas-wrap">
          <canvas id="staff-canvas" width="720" height="360" aria-label="当前五线谱音符"></canvas>
        </div>

        <div class="question-meta">
          <span id="clef-label">高音谱</span>
          <span id="range-label">五线与四间</span>
          <span id="step-label">位置</span>
        </div>

        <div class="pattern-progress" id="pattern-progress" hidden></div>

        <div class="feedback" id="feedback" role="status">
          选择一个音名和一个唱名后自动校验。
        </div>
      </section>

      <div class="challenge-answers" id="challenge-answers" hidden></div>

      <div class="relation-answers" id="relation-answers" hidden>
        <div class="answer-heading">两音关系</div>
        <div class="relation-grid" id="relation-grid"></div>
      </div>

      <section class="answer-area" aria-label="答题区">
        <div class="answer-group">
          <div class="answer-heading">音名</div>
          <div class="answer-grid" id="letter-buttons"></div>
        </div>
        <div class="answer-group">
          <div class="answer-heading">唱名</div>
          <div class="answer-grid solfege-grid" id="solfege-buttons"></div>
        </div>
      </section>

      <footer class="action-row">
        <button class="reset-pattern-btn" id="reset-pattern" type="button" hidden>完全重置</button>
        <button class="secondary-button" id="show-answer" type="button">显示答案</button>
        <button class="primary-button" id="next-question" type="button">下一题</button>
      </footer>

      <section class="controls" aria-label="练习设置">
        <label>
          <span>谱号</span>
          <select id="clef-setting">
            <option value="mixed">高音 + 低音</option>
            <option value="treble">高音谱</option>
            <option value="bass">低音谱</option>
          </select>
        </label>
        <label>
          <span>难度</span>
          <select id="difficulty-setting">
            <option value="staff">五线与四间</option>
            <option value="ledger1">加线 1-2 条</option>
            <option value="ledger2">加线 1-4 条</option>
          </select>
        </label>
        <label>
          <span>加线</span>
          <select id="ledger-direction">
            <option value="mixed">上下混合</option>
            <option value="above">上加线</option>
            <option value="below">下加线</option>
          </select>
        </label>
        <label>
          <span>范围</span>
          <select id="ledger-kind">
            <option value="lines">只考线</option>
            <option value="all">线和间</option>
          </select>
        </label>
        <label class="switch-row">
          <input id="autoplay-setting" type="checkbox">
          <span>自动播放</span>
        </label>
        <label class="switch-row">
          <input id="hint-setting" type="checkbox" checked>
          <span>中文提示</span>
        </label>
        <label class="switch-row">
          <input id="weak-setting" type="checkbox" checked>
          <span>随机混入错题</span>
        </label>
      </section>
      <div class="modal-overlay" id="level-complete-modal" hidden>
        <div class="modal-card">
          <h2>关卡通过！</h2>
          <p class="modal-level-name" id="modal-level-name"></p>
          <div class="modal-stats">
            <div><span class="modal-stat-value" id="modal-time"></span><span class="modal-stat-label">秒</span></div>
            <div><span class="modal-stat-value" id="modal-attempts"></span><span class="modal-stat-label">次挑战</span></div>
          </div>
          <button class="primary-button" id="modal-next-level">进入下一关</button>
          <p class="modal-final" id="modal-final" hidden>恭喜！你已完成全部 27 关！</p>
        </div>
      </div>
    </main>
  </body>
</html>
